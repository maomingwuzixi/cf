<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>测试页</title>
      <style>
        /* 这是让页脚固定在底部的关键代码 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%; /* 让网页占满整个屏幕高度 */
        }
        body {
            background-color: lightblue;
            padding: 20px;
            text-align: center;
            position: relative; /* 定位父级 */
            min-height: 100vh;
        }
        footer {
            position: absolute; /* 固定定位 */
            bottom: 20px; /* 距离底部20px */
            left: 0;
            right: 0;
            text-align: center;
            color: #333;
        }
    </style>
</head>
